name: Community Toolkits (Test)

on:
  push:
    branches:
      - dev/ericgustin/community-toolkits

jobs:
  create-community-toolkit-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.10-${{ hashFiles('arcade/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: cd arcade && poetry install --no-interaction --all-extras
        shell: bash

      - name: Run script
        run: python community_toolkits/create_community_toolkit_docs.py

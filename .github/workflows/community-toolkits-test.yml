name: Community Toolkits (Test)

on:
  push:
    branches:
      - dev/ericgustin/community-toolkits

jobs:
  create-community-toolkit-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Load cached venv
        uses: actions/cache@v4
        with:
          path: .tox
          key: venv-${{ runner.os }}-3.10-${{ hashFiles('arcade/poetry.lock') }}

      - name: Run script
        run: python community_toolkits/create_community_toolkit_docs.py

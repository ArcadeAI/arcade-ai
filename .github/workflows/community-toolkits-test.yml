name: Community Toolkits (Test)

on:
  push:
    branches:
      - dev/ericgustin/community-toolkits

env:
  PYTHON_VERSION: "3.11"

jobs:
  create-community-toolkit-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies and activate venv
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: |
          cd arcade
          poetry install --no-interaction --all-extras
          poetry run python ../community_toolkits/create_community_toolkit_docs.py
        shell: bash
